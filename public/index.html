<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lugares Turísticos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>🌍 Lugares Turísticos</h1>
    <nav>
      <a href="index.html" class="ativo">Gerenciar</a>
      <a href="mapa.html">Ver no Mapa</a>
    </nav>
  </header>

  <main>
    <section class="formulario">
      <h2 id="titulo-form">Adicionar Lugar</h2>
      <form id="form-lugar">
        <input type="hidden" id="campo-id" />

        <label>Nome</label>
        <input type="text" id="campo-nome" placeholder="Ex: Coliseu" required />

        <label>País</label>
        <input type="text" id="campo-pais" placeholder="Ex: Itália" required />

        <label>Descrição</label>
        <input type="text" id="campo-descricao" placeholder="Breve descrição" required />

        <label>Latitude</label>
        <input type="number" id="campo-lat" step="any" placeholder="Ex: 41.8902" required />

        <label>Longitude</label>
        <input type="number" id="campo-lng" step="any" placeholder="Ex: 12.4922" required />

        <div class="botoes-form">
          <button type="submit" id="btn-salvar">Salvar</button>
          <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
        </div>
      </form>
    </section>
    <section class="lista">
      <h2>Lugares Cadastrados</h2>
      <div id="lista-lugares"></div>
    </section>

  </main>

  <script src="crud.js"></script>
</body>
</html>
